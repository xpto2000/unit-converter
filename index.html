<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Multi-Unit Converter</title>
    <style>
        /* CSS VARIABLES: Easy to change colors in one place */
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --text-main: #1f2937;
            --card-bg: rgba(255, 255, 255, 0.98);
        }

        /* LAYOUT: Centering the card on the screen */
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
            background: var(--bg-gradient);
        }

        /* CARD STYLING */
        .converter-card { 
            background: var(--card-bg);
            padding: 2.5rem; 
            border-radius: 24px; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); 
            width: 90%; max-width: 420px;
        }

        h2 { margin: 0 0 1.5rem; color: var(--text-main); text-align: center; font-weight: 800; }

        /* FORM ELEMENTS */
        .group { margin-bottom: 1.2rem; }
        
        label { display: block; margin-bottom: 6px; font-size: 0.75rem; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; }

        select, input { 
            width: 100%; padding: 12px 16px; 
            border: 2px solid #e5e7eb; border-radius: 12px; 
            font-size: 1rem; color: var(--text-main);
            transition: all 0.2s ease; outline: none; box-sizing: border-box;
        }

        select:focus, input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }

        /* SWAP SECTION: Aligning From - Button - To */
        .swap-container {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            margin-bottom: 1.2rem;
        }

        .swap-container > .group { flex: 1; margin-bottom: 0; }

        .revert-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            height: 45px; width: 45px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; transition: all 0.2s ease; flex-shrink: 0;
        }

        .revert-btn:hover { background: var(--primary-hover); transform: rotate(180deg); }

        /* RESULT DISPLAY */
        .result-box { 
            background: #f8fafc; border: 2px dashed #cbd5e1;
            padding: 20px; border-radius: 16px; margin-top: 1.5rem;
            text-align: center; font-size: 1.4rem; font-weight: 700; color: var(--primary);
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="converter-card">
    <h2>Unit Converter</h2>

    <!-- Category Dropdown -->
    <div class="group">
        <label>Category</label>
        <select id="category" onchange="updateUnits()">
            <option value="distance">Distance</option>
            <option value="liquid">Liquid</option>
            <option value="area">Area</option>
            <option value="weight">Weight</option>
            <option value="digital">Digital Storage</option>
        </select>
    </div>

    <!-- Numeric Input -->
    <div class="group">
        <label>Amount to Convert</label>
        <input type="number" id="inputValue" value="1" oninput="convert()" placeholder="0.00">
    </div>

    <!-- Conversion Units & Swap Button -->
    <div class="swap-container">
        <div class="group">
            <label>From</label>
            <select id="fromUnit" onchange="convert()"></select>
        </div>
        
        <button class="revert-btn" onclick="revertUnits()" title="Swap Units">⇄</button>

        <div class="group">
            <label>To</label>
            <select id="toUnit" onchange="convert()"></select>
        </div>
    </div>

    <!-- Dynamic Result -->
    <div class="result-box" id="resultDisplay">1</div>
</div>

<script>
    /** 
     * CONVERSION DATA
     * All values are relative to a 'base' unit for that category.
     * This makes it easy to add new units without writing 100s of formulas.
     */
    const data = {
        distance: { base: 'meter', units: { meter: 1, kilometer: 0.001, mile: 0.000621, foot: 3.280, inch: 39.37 } },
        liquid: { base: 'liter', units: { liter: 1, milliliter: 1000, gallon: 0.264, cup: 4.226, ounce: 33.81 } },
        area: { base: 'sqMeter', units: { sqMeter: 1, sqKilometer: 0.000001, acre: 0.000247, sqFoot: 10.76 } },
        weight: { base: 'kg', units: { kg: 1, gram: 1000, pound: 2.204, ounce: 35.27 } },
        digital: { base: 'mb', units: { mb: 1, kb: 1024, gb: 0.000976, tb: 0.00000095 } }
    };

    /** Updates the From/To dropdowns when a category changes */
    function updateUnits() {
        const cat = document.getElementById('category').value;
        const fromS = document.getElementById('fromUnit');
        const toS = document.getElementById('toUnit');
        
        fromS.innerHTML = "";
        toS.innerHTML = "";

        // Loop through the data object and create <option> tags
        Object.keys(data[cat].units).forEach(u => {
            let label = u.charAt(0).toUpperCase() + u.slice(1);
            fromS.add(new Option(label, u));
            toS.add(new Option(label, u));
        });

        // Set the second unit as default for the 'To' field
        if(toS.options.length > 1) toS.selectedIndex = 1;
        
        convert();
    }

    /** Swaps the From and To values */
    function revertUnits() {
        const fromS = document.getElementById('fromUnit');
        const toS = document.getElementById('toUnit');
        const temp = fromS.value;
        fromS.value = toS.value;
        toS.value = temp;
        convert();
    }

    /** The math engine: Converts Input -> Base -> Output */
    function convert() {
        const cat = document.getElementById('category').value;
        const val = parseFloat(document.getElementById('inputValue').value);
        const from = document.getElementById('fromUnit').value;
        const to = document.getElementById('toUnit').value;
        const display = document.getElementById('resultDisplay');

        if (isNaN(val)) { 
            display.textContent = "-"; 
            return; 
        }

        const rates = data[cat].units;
        // Formula: (Initial Value / Current Unit Rate) * Target Unit Rate
        const result = (val / rates[from]) * rates[to];
        
        // Format with commas and max 5 decimal places
        const formatted = result.toLocaleString(undefined, {
            maximumFractionDigits: 5,
            minimumFractionDigits: 0
        });

        display.textContent = `${formatted} ${to}`;
    }

    // Initialize the tool when the page loads
    updateUnits();
</script>
</body>
</html>
